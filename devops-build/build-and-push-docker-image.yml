parameters:
  - name: Repository
    type: string
  - name: Dockerfile
    type: string
  - name: IsRelease
    type: boolean
    
steps:
- task: Docker@2
  displayName: Build ${{ parameters.Repository }}
  inputs:
    command: build
    repository: ${{ parameters.Repository }}
    dockerfile: ${{ parameters.Dockerfile }}
    buildContext: $(System.DefaultWorkingDirectory)
    tags: |
      $(Build.BuildNumber)

- task: Docker@2
  condition: ${{ eq(parameters.IsRelease, true) }}
  displayName: Push ${{ parameters.Repository }}
  inputs:
    command: push
    containerRegistry: $(DockerRegistryPublicConnection)
    repository: ${{ parameters.Repository }}
    tags: |
      $(Build.BuildNumber)
      
- task: Docker@2
  condition: ${{ eq(parameters.IsRelease, false) }}
  displayName: Push to private ${{ parameters.Repository }}
  inputs:
    command: push
    containerRegistry: $(DockerRegistryPrivateConnection)
    repository: ${{ parameters.Repository }}
    tags: |
      $(Build.BuildNumber)
