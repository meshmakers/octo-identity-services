parameters:
  - name: ConstructionKits
    type: object
    default: [ ]

steps:
  - ${{ each ConstructionKit in parameters.ConstructionKits }}:
      - task: DotNetCoreCLI@2
        displayName: 'Generate Documentation'
        inputs:
          command: 'build'
          projects: ${{ ConstructionKit }}
          arguments: '--configuration Release /p:OctoGenerateCkDocumentation=true /p:OctoNugetPrivateServer=$(nugetPrivateServer)'

  - task: CopyFiles@2
    displayName: 'Copy Files from $(Build.SourcesDirectory)/**/octo-ck-libraries/**/out/**/*.md to $(build.artifactstagingdirectory)'
    inputs:
      SourceFolder: $(Build.SourcesDirectory)
      Contents: |
        /**/octo-ck-libraries/**/out/**/*.md
        /**/octo-ck-libraries/**/out/*.yaml
      TargetFolder: $(build.artifactstagingdirectory)