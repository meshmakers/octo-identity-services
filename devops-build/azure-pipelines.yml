name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: GitSSHGroup
  - group: ApiKeys
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.Identity.sln'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: generateDocumentation
    value: 'true'
  - name: MajorVersion
    value: '0'
  - name: MinorVersion
    value: '1'
  - name: buildConfiguration
    value: 'Release'

stages:
  - stage: Build
    jobs:
      - job: linux
        displayName: Docker build
        pool:
          name: Gerald-Local-Linux
        steps:
          - template: update-build-number.yml
          - checkout: self
            clean: true
            submodules: recursive
          - task: InstallSSHKey@0
            inputs:
              knownHostsEntry: '$(SSHKnownHosts)'
              sshPublicKey: '$(SSHPublicKey)'
              sshPassphrase: '$(SSHPassphrase)'
              sshKeySecureFile: '$(SSHPrivateKeyFile)'
          - template: set-version.yml
          - template: download-ca.yml
          - task: DotNetCoreCLI@2
            displayName: 'Build src'
            inputs:
              command: 'build'
              projects: |
                src/**/*.csproj
              arguments: '--configuration $(buildConfiguration)'
          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              projects: |
                '**/*Tests.csproj'
                !'**/*SystemTests.csproj'
              testRunTitle: 'CI'
          - task: CopyFiles@2
            displayName: 'Copy Files from /**/octo-ck-libraries/**/out/**/*.yaml to $(build.artifactstagingdirectory)'
            inputs:
              SourceFolder: $(Build.SourcesDirectory)
              Contents: |
                **/octo-ck-libraries/**/out/**/*.yaml
              TargetFolder: $(build.artifactstagingdirectory)
          - task: PowerShell@2
            displayName: 'Create versioninfo file'
            inputs:
              targetType: 'inline'
              script: |
                New-Item $(build.artifactstagingdirectory)/versioninfo.txt
                Set-Content $(build.artifactstagingdirectory)/versioninfo.txt $(Build.BuildNumber)
          - template: build-and-push-docker-image.yml
            parameters:
              Repository: meshmakers/octo-mesh-identity-services
              Dockerfile: src/IdentityServices/Dockerfile
              IsRelease: ${{ variables.isRelease }}
          - template: build-and-push-docker-image.yml
            parameters:
              Repository: meshmakers/octo-mesh-policy-services
              Dockerfile: src/PolicyServices/Dockerfile
              IsRelease: ${{ variables.isRelease }}
          - ${{ if eq(variables.generateDocumentation, true) }}:
              - template: generate-documentation.yml
                parameters:
                  ConstructionKits:
                    - '**/Persistence.IdentityCkModel.csproj'
          - task: PublishBuildArtifacts@1
            displayName: 'Publish Artifact: local'
            inputs:
              ArtifactName: local
 

