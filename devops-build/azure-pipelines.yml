name: $(MajorVersion).$(MinorVersion).$(date:yyMM).$(DayOfMonth)$(rev:rrr)-$(Build.SourceBranchName)

trigger:
  batch: true
  branches:
    include:
      - dev/*
      - test/*
      - main
  tags:
    exclude:
      - '*'

variables:
  - group: GitSSHGroup
  - group: ApiKeys-mm-cloud
  - group: OctoDefault
  - name: solutionFile
    value: 'Octo.Identity.sln'
  - name: artifactsFrameworkVersion
    value: 'net10.0'
  - name: buildConfiguration
    value: 'Release'
  - name: buildPlatform
    value: 'Any CPU'
  - name: isRelease
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/tags/r') }}
  - name: isMain
    value: ${{ eq(variables['Build.SourceBranch'], 'refs/heads/main') }}
  - name: isTest
    value: ${{ startsWith(variables['Build.SourceBranch'], 'refs/heads/test') }}
  # CK publish routing (effectivePublishCatalog: GitHub catalogs only on main/r* tags,
  # incident: Industry.Basic-2.1.1) and the per-run local catalog root
  # (OctoLocalCatalogRootPath -> Agent.TempDirectory, AB#4167) are exported as runtime
  # variables by update-build-number.yml. The run-isolated catalog is writable, so
  # feature branches publish CK models locally again (verifies the publish machinery).

stages:
  - stage: Build
    jobs:
      - job: linux
        displayName: Docker build
        pool:
          name: meshmakers-ci-agents
        steps:
          - template: update-build-number.yml
          - task: InstallSSHKey@0
            inputs:
              knownHostsEntry: '$(SSHKnownHosts)'
              sshPublicKey: '$(SSHPublicKey)'
              sshPassphrase: '$(SSHPassphrase)'
              sshKeySecureFile: '$(SSHPrivateKeyFile)'
          - checkout: self
            clean: true
            submodules: recursive
          - template: set-version.yml
          - template: download-ca.yml
          - task: DotNetCoreCLI@2
            displayName: 'Restore NuGet packages'
            inputs:
              command: 'restore'
              projects: '$(SolutionFile)'
              restoreArguments: '--force /p:OctoNugetPrivateServer=$(nugetPrivateServer)'
              noCache: true
          - task: DotNetCoreCLI@2
            displayName: 'Build'
            inputs:
              command: 'build'
              projects:  $(SolutionFile)
              arguments: '--configuration $(BuildConfiguration) /p:OctoNugetPrivateServer=$(nugetPrivateServer) /p:OctoPublishCatalog="$(effectivePublishCatalog)" /p:OctoPrivateGitHubApiKey=$(GitHubPAT) /p:OctoPublicGitHubApiKey=$(GitHubPAT)'
              publishWebProjects: false
              zipAfterPublish: false
              modifyOutputPath: false            
          - script: |
              echo "=== Docker Diagnostics ==="
              echo "DOCKER_HOST: $DOCKER_HOST"
              docker version || echo "ERROR: Docker not available"
              docker info || echo "ERROR: Docker info failed"
              echo ""
              echo "=== Docker Network ==="
              docker network ls || echo "ERROR: Cannot list networks"
              docker network inspect bridge || echo "ERROR: Cannot inspect bridge network"
              echo ""
              echo "=== Pre-pulling MongoDB image ==="
              docker pull mongo:8.0.15 || echo "Warning: Failed to pre-pull MongoDB image"
              echo ""
              echo "=== Docker Images ==="
              docker images | grep -E "mongo|REPOSITORY" || echo "No mongo images found"
            displayName: 'Docker diagnostics and pre-pull'
            env:
              DOCKER_HOST: unix:///var/run/docker.sock
          - task: DotNetCoreCLI@2
            displayName: 'Test'
            inputs:
              command: 'test'
              arguments: '--configuration $(buildConfiguration) -p:OctoNugetPrivateServer=$(nugetPrivateServer) /p:OctoPublishCkModel=false --logger "console;verbosity=detailed"'
              projects: |
                **/*Tests.csproj
                !**/*SystemTests.csproj
            env:
              # Testcontainers configuration for DinD (Docker-in-Docker)
              DOCKER_HOST: unix:///var/run/docker.sock
              # Ryuk (resource reaper) can cause issues in constrained CI environments
              TESTCONTAINERS_RYUK_DISABLED: 'true'
              # Host override for DinD: use Docker bridge gateway IP to reach containers
              TESTCONTAINERS_HOST_OVERRIDE: '172.17.0.1'
          - template: build-and-push-docker-image.yml
            parameters:
              PublicRegistryServiceConnection: $(DockerRegistryPublicConnection)
              PrivateRegistryName: $(DockerRegistryPrivateUri)
              Repository: meshmakers/octo-mesh-identity-services
              Dockerfile: src/IdentityServices/Dockerfile
          - template: handle-artifacts.yml
            parameters:
              constructionKitLibraryPaths:
                - 'src/Persistence.IdentityCkModel/bin/$(buildConfiguration)/$(artifactsFrameworkVersion)/octo-ck-libraries/Persistence.IdentityCkModel'

 

