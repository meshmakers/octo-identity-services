steps:
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      Write-Host "Source Branch $(Build.SourceBranch)"
      Write-Host "Source Branch Name $(Build.SourceBranchName)"
      Write-Host "Buildnumber $(Build.BuildNumber)"
      $branch = '$(Build.SourceBranch)'
      $buildNumber = '$(Build.BuildNumber)'
      $versionString = $buildNumber
      if ($buildNumber.Contains("-")) {
        $versionString = $buildNumber.SubString(0, $buildNumber.IndexOf("-"))
      }
      $versionArray = $versionString.Split(".")
      $major = [int]$versionArray[0]
      $minor = [int]$versionArray[1]
      $build = [int]$versionArray[2]
      $revision = [int]$versionArray[3]
      $buildNumberShort = "$major.$minor.$build"
      $buildNumberLong = "$major.$minor.$build.$revision"

      $octoPublishCatalog = "PrivateGitHubCatalog"

      $octoVersion = "0.1.*";

      # Handle dev branches - sanitize branch name for Docker tags
      # Docker tags only allow: letters, digits, underscores, periods, and hyphens
      if ($branch.StartsWith("refs/heads/dev/")) {
        Write-host "Branch is dev branch"
        $branchName = '$(Build.SourceBranchName)'
        # Replace any character not allowed in Docker tags with _
        $sanitizedBranchName = $branchName -replace '[^a-zA-Z0-9_.-]', '_'
        $fullBuildNumber = "$major.$minor.$build.$revision-$sanitizedBranchName"
        Write-Host "Sanitized branch name from '$branchName' to '$sanitizedBranchName'"
        Write-Host "Setting build number to $fullBuildNumber"
        Write-Host "##vso[build.updatebuildnumber]$fullBuildNumber"
      }

      if ($branch.StartsWith("refs/heads/test/")) {
        Write-host "Branch is test branch"
        $branchName = '$(Build.SourceBranchName)'
        $versionString = $branchName.SubString(0, $branchName.IndexOf("-"))
        $newBranchName = $branchName.SubString($branchName.IndexOf("-") + 1)
        Write-Host "Version string is $versionString"
        $versionArray = $versionString.Split(".")
        $major = [int]$versionArray[0]
        $minor = [int]$versionArray[1]
        $buildNumberShort = "$major.$minor.$build"
        $buildNumberLong = "$major.$minor.$build.$revision"
        $fullBuildNumber = "$major.$minor.$build.$revision-$newBranchName"
        Write-Host "Setting build number to $buildNumberLong"
        Write-Host "##vso[build.updatebuildnumber]$fullBuildNumber"
      
        $octoVersion = "$major.$minor.*"
        Write-Host "Setting OctoVersion to $octoVersion"
      }
      
      if ($branch.StartsWith("refs/tags/r")) {
        Write-host "Branch is release branch"
        $branchName = '$(Build.SourceBranchName)'
        $versionString = $branchName.SubString(1)
        $versionArray = $versionString.Split(".")
        $major = [int]$versionArray[0]
        $minor = [int]$versionArray[1]
        $build = [int]$versionArray[2]
        $buildNumberShort = "$major.$minor.$build"
        $buildNumberLong = "$major.$minor.$build.0"
        Write-Host "Setting build number to $buildNumberLong"
        Write-Host "##vso[build.updatebuildnumber]$buildNumberLong"
      
        $octoPublishCatalog = "PublicGitHubCatalog"
      
        Write-Host "Setting OctoVersion to $buildNumberShort"
        $octoVersion = $buildNumberShort
      }
      # CK model publish routing: only main and release tags publish to the GitHub
      # catalogs; every other branch publishes to the run-isolated local catalog.
      # Mirrors octo-pipeline-templates/templates/steps/update-build-number.yml
      # (tpl-v0.3.0, AB#4167) until this repo migrates to the shared template.
      $effectivePublishCatalog = "LocalFileSystemCatalog"
      if ($branch -eq "refs/heads/main" -or $branch.StartsWith("refs/tags/r")) {
        $effectivePublishCatalog = $octoPublishCatalog
      }

      # Per-run local CK catalog root: Agent.TempDirectory is purged per job, so a
      # feature-branch publish can never leak into another build on this agent.
      $octoLocalCatalogRootPath = "$(Agent.TempDirectory)/octo-local-catalog"

      Write-Host "Setting build number short to '$buildNumberShort', build number long to '$buildNumberLong'"
      Write-Host "Setting effectivePublishCatalog to '$effectivePublishCatalog'"
      Write-Host "Setting OctoLocalCatalogRootPath to '$octoLocalCatalogRootPath'"
      Write-Host "##vso[task.setvariable variable=MajorVersion;]$major"
      Write-Host "##vso[task.setvariable variable=MinorVersion;]$minor"
      Write-Host "##vso[task.setvariable variable=BuildNumberShort;]$buildNumberShort"
      Write-Host "##vso[task.setvariable variable=BuildNumberLong;]$buildNumberLong"
      Write-Host "##vso[task.setvariable variable=OctoVersion;]$octoVersion"
      Write-Host "##vso[task.setvariable variable=OctoPublishCatalog;]$octoPublishCatalog"
      Write-Host "##vso[task.setvariable variable=effectivePublishCatalog;]$effectivePublishCatalog"
      Write-Host "##vso[task.setvariable variable=OctoLocalCatalogRootPath;]$octoLocalCatalogRootPath"
  displayName: 'Set build number'