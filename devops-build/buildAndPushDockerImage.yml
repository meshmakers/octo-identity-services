parameters:
  - name: ContainerRegistry
    type: string
  - name: Repository
    type: string
  - name: Dockerfile
    type: string
  - name: IsRelease
    type: boolean

steps:
  - task: Docker@2
    displayName: Login to ${{ parameters.ContainerRegistry }}
    inputs:
      command: login
      containerRegistry: ${{ parameters.ContainerRegistry }}

  - task: CmdLine@2
    displayName: Build only ${{ parameters.Repository }}:$(Build.BuildNumber)
    condition: eq('${{ parameters.IsRelease }}', false)
    inputs:
      script: |
        docker buildx create --use --name mybuilder --bootstrap &&
        docker buildx build --platform linux/arm64,linux/amd64 \
          -f ${{ parameters.Dockerfile }} \
          -t ${{ parameters.Repository }}:$(build.buildNumber) \
          $(System.DefaultWorkingDirectory) &&
        docker buildx rm mybuilder

  - task: CmdLine@2
    displayName: Build and Push ${{ parameters.Repository }}:$(Build.BuildNumber)
    condition: eq('${{ parameters.IsRelease }}', true)
    inputs:
      script: |
        docker buildx create --use --name mybuilder --bootstrap &&
        docker buildx build --platform linux/arm64,linux/amd64 \
          -f ${{ parameters.Dockerfile }} \
          -t ${{ parameters.Repository }}:$(build.buildNumber) \
          --push \
          $(System.DefaultWorkingDirectory) &&
        docker buildx rm mybuilder