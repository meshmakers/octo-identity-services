entities:

  # ===========================================================================
  # ROLES (660…01 – 660…0E) — fourteen built-in roles. Names match
  # `Meshmakers.Octo.Communication.Contracts.CommonConstants.*Role`. The seed
  # writes Name + NormalizedName only; SubjectIds / IdentityRoleIds / RoleClaims
  # are populated at runtime by IdentityServer's RoleManager and must not be
  # reset by a blueprint re-apply (force: true). They are marked
  # isRuntimeState in CK model 2.7.0+ so the engine's
  # PreserveRuntimeStateAttributesAsync keeps existing values on re-apply.
  # ===========================================================================

  - rtId: '660000000000000000000001'
    ckTypeId: System.Identity/Role
    rtWellKnownName: TenantManagement
    attributes:
      - id: System/Name
        value: TenantManagement
      - id: System.Identity/NormalizedName
        value: TENANTMANAGEMENT

