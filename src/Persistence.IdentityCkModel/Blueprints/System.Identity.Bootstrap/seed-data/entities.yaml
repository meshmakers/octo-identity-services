      - id: System.Identity/ResourceClaims
        value: []
      - id: System.Identity/ShowInDiscoveryDocument
        value: true
      - id: System.Identity/IsRequired
        value: false
      - id: System.Identity/IsEmphasized
        value: false

  # ===========================================================================
  # API RESOURCES (660…20) — OctoApi advertises all three scopes plus the
  # `role` user claim so role-based authorization works on every protected
  # endpoint.
  # ===========================================================================

  - rtId: '660000000000000000000020'
    ckTypeId: System.Identity/ApiResource
    rtWellKnownName: octoAPI
    attributes:
      - id: System/Enabled
        value: true
      - id: System/Name
        value: octoAPI
      - id: System/DisplayName
        value: Octo API
      - id: System/Description
        value: Unified access to all Octo platform APIs
      - id: System.Identity/ResourceClaims
        value:
          - role
      - id: System.Identity/ShowInDiscoveryDocument
        value: true
      - id: System.Identity/RequireResourceIndicator
        value: false
      - id: System.Identity/Secrets
        value: []
      - id: System.Identity/Scopes
        value:
          - octo_api
          - octo_api.read_only
          - octo_api.data_model_management
      - id: System.Identity/AllowedAccessTokenSigningAlgorithms
        value: []

  # MCP resource indicator (RFC 8707). Interactive OAuth clients like Claude Code send
  # resource=<mcp public url> on /connect/authorize; Duende matches the value exactly against an
  # ApiResource Name. Without this, the request fails with invalid_target. The MCP server itself does
  # not validate the audience (ValidateAudience=false), so this only satisfies the resource indicator
  # — it is an isolated protocol shim, NOT a per-service audience: it carries the same scopes as
  # octoAPI (660…020) and no resource server validates it. The trailing slash is required: the value
  # must match byte-for-byte what the client transmits, and ${octo.mcp.publicUrl} resolves without one.
  - rtId: '660000000000000000000021'
    ckTypeId: System.Identity/ApiResource
    rtWellKnownName: mcpApi
    attributes:
      - id: System/Enabled
        value: true
      - id: System/Name
        value: '${octo.mcp.publicUrl}/'
      - id: System/DisplayName
        value: Octo MCP API
      - id: System/Description
        value: Resource indicator for the MCP server (interactive OAuth clients such as Claude Code)
      - id: System.Identity/ResourceClaims
        value:
          - role
      - id: System.Identity/ShowInDiscoveryDocument
        value: true
      - id: System.Identity/RequireResourceIndicator
        value: false
      - id: System.Identity/Secrets
        value: []
      - id: System.Identity/Scopes
        value:
          - octo_api
          - octo_api.read_only
          - octo_api.data_model_management
      - id: System.Identity/AllowedAccessTokenSigningAlgorithms
        value: []

  # ===========================================================================
  # CLIENTS (660…30 – 660…32). The full attribute set is large — every
  # property the imperative seed sets explicitly is mirrored here. Attributes
  # not configured by the seed (claims, custom prefixes, CIBA settings) get
  # the IdentityServer default the engine derives from the CK model defaults.
  # ===========================================================================

  # --------------------------------------------------------------------------
  # 660…30 — Refinery Studio (OIDC SPA, authorization code + PKCE). URLs use
  # the ${octo.identity.refineryStudioUrl} variable resolved at apply time by
  # IdentityBlueprintVariableProvider (PR #3). When the option is unset the
  # placeholder resolves to the empty string and the OIDC flow fails on user
  # login — the configuration error is then visible to the operator instead
  # of silently swallowed.
  # --------------------------------------------------------------------------
  - rtId: '660000000000000000000030'
    ckTypeId: System.Identity/Client
    rtWellKnownName: RefineryStudioClient
    attributes:
      - id: System/Enabled
        value: true
      - id: System.Identity/ClientId
        value: octo-data-refinery-studio
      - id: System/Name
        value: Data Refinery Studio
      - id: System.Identity/ClientUri
        value: '${octo.identity.refineryStudioUrl}'
      - id: System.Identity/ProtocolType
        value: oidc
      - id: System.Identity/RequireClientSecret
        value: false
      - id: System.Identity/Secrets
        value: []
      - id: System.Identity/AllowedGrantTypes
        value:
          - authorization_code
      - id: System.Identity/RequirePkce
        value: true
      - id: System.Identity/RequireConsent
        value: false
      - id: System.Identity/AllowAccessTokensViaBrowser
        value: true
      - id: System.Identity/AlwaysIncludeUserClaimsInIdToken
        value: true
      - id: System.Identity/UpdateAccessTokenClaimsOnRefresh
        value: true
      - id: System.Identity/AccessTokenType
        value: 0   # Jwt
      # AB#4209 Step 2b — {{family.local-dev}} placeholder expanded at Identity startup by
      # BlueprintClientUriFamilyResolver from OctoIdentityServicesOptions.UriFamilies. Each
      # member becomes one entry with Source = "family:local-dev". Unconfigured local-dev
      # family (production clusters) drops the placeholder silently. Members are stored
      # verbatim — set values that match the target list's format contract (trailing slash
      # for redirect/post-logout, no slash for CORS origin) or configure separate families.
      - id: System.Identity/RedirectUris
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.identity.refineryStudioUrl}/'
              - id: System.Identity/Source
                value: base
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '{{family.local-dev}}'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/PostLogoutRedirectUris
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.identity.refineryStudioUrl}/'
              - id: System.Identity/Source
                value: base
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '{{family.local-dev}}'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/AllowedCorsOrigins
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.identity.refineryStudioUrl}'
              - id: System.Identity/Source
                value: base
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '{{family.local-dev}}'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/FrontChannelLogoutUri
        value: '${octo.identity.refineryStudioUrl}/logout/callback'
      - id: System.Identity/FrontChannelLogoutSessionRequired
        value: true
      - id: System.Identity/AllowOfflineAccess
        value: true
      - id: System.Identity/AllowedScopes
        value:
          - openid
          - profile
          - email
          - role
          - allowed_tenants
          - octo_api
      - id: System.Identity/AutoProvisionInChildTenants
        value: true

  # --------------------------------------------------------------------------
  # 660…31 — OctoTool / octo-cli (device-code flow, no PKCE, no client secret)
  # --------------------------------------------------------------------------
  - rtId: '660000000000000000000031'
    ckTypeId: System.Identity/Client
    rtWellKnownName: OctoToolClient
    attributes:
      - id: System/Enabled
        value: true
      - id: System.Identity/ClientId
        value: octo-cli
      - id: System.Identity/ProtocolType
