      - id: System.Identity/ProtocolType
        value: oidc
      - id: System.Identity/RequireClientSecret
        value: false
      - id: System.Identity/Secrets
        value: []
      - id: System.Identity/AllowedGrantTypes
        value:
          - authorization_code
      - id: System.Identity/RequirePkce
        value: true
      - id: System.Identity/AllowAccessTokensViaBrowser
        value: true
      - id: System.Identity/AlwaysIncludeUserClaimsInIdToken
        value: true
      - id: System.Identity/AccessTokenType
        value: 0   # Jwt
      - id: System.Identity/RedirectUris
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.identity.authorityUrl}/swagger/oauth2-redirect.html'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/PostLogoutRedirectUris
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.identity.authorityUrl}/'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/AllowedCorsOrigins
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.identity.authorityUrl}'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/AllowedScopes
        value:
          - openid
          - profile
          - email
          - role
          - octo_api
          - octo_api.read_only
      - id: System.Identity/AutoProvisionInChildTenants
        value: true

  # --------------------------------------------------------------------------
  # 660…33 — MCP Services Swagger UI (authorization code + PKCE; URLs derived
  # from OctoIdentityServicesOptions.ServicePublicUrlOverrides["mcp"] in dev,
  # or ${octo.scheme}://mcp.${octo.domain} in cluster — see
  # IdentityBlueprintVariableProvider.ResolvePublicUrl). AB#4208.
  # --------------------------------------------------------------------------
  - rtId: '660000000000000000000033'
    ckTypeId: System.Identity/Client
    rtWellKnownName: McpServicesSwaggerClient
    attributes:
      - id: System/Enabled
        value: true
      - id: System.Identity/ClientId
        value: octo-mcpServices-swagger
      - id: System/Name
        value: OctoMesh MCP Services Swagger Client
      - id: System.Identity/ClientUri
        value: '${octo.mcp.publicUrl}'
      - id: System.Identity/ProtocolType
        value: oidc
      - id: System.Identity/RequireClientSecret
        value: false
      - id: System.Identity/Secrets
        value: []
      - id: System.Identity/AllowedGrantTypes
        value:
          - authorization_code
      - id: System.Identity/RequirePkce
        value: true
      - id: System.Identity/AllowAccessTokensViaBrowser
        value: true
      - id: System.Identity/AlwaysIncludeUserClaimsInIdToken
        value: true
      - id: System.Identity/AccessTokenType
        value: 0   # Jwt
      - id: System.Identity/RedirectUris
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.mcp.publicUrl}/swagger/oauth2-redirect.html'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/PostLogoutRedirectUris
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.mcp.publicUrl}/'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/AllowedCorsOrigins
        value:
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: '${octo.mcp.publicUrl}'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/AllowedScopes
        value:
          - openid
          - profile
          - email
          - role
          - octo_api
      - id: System.Identity/AutoProvisionInChildTenants
        value: true

  # --------------------------------------------------------------------------
  # 660…34 — MCP Services Device Authorization Flow (CLI / AI clients like
  # Claude Code). No redirect URIs, offline access enabled. AB#4208.
  # --------------------------------------------------------------------------
  - rtId: '660000000000000000000034'
    ckTypeId: System.Identity/Client
    rtWellKnownName: McpServicesDeviceClient
    attributes:
      - id: System/Enabled
        value: true
      - id: System.Identity/ClientId
        value: octo-mcpServices-device
      - id: System/Name
        value: OctoMesh MCP Services Device Client
      - id: System.Identity/ClientUri
        value: '${octo.mcp.publicUrl}'
      - id: System.Identity/ProtocolType
        value: oidc
      - id: System.Identity/RequireClientSecret
        value: false
      - id: System.Identity/Secrets
        value: []
      - id: System.Identity/AllowedGrantTypes
        value:
          - urn:ietf:params:oauth:grant-type:device_code
          # AB#4338: RFC 8693 Token Exchange — lets the MCP server mint a
          # target-tenant (B) access token from the user's already-valid A token
          # (subject_token) without a browser prompt. Roles are re-resolved in B
          # by the TenantExchangeGrantValidator; no privilege leak.
          - urn:ietf:params:oauth:grant-type:token-exchange
      - id: System.Identity/RequirePkce
        value: false
      - id: System.Identity/AllowOfflineAccess
        value: true
      - id: System.Identity/AllowedScopes
        value:
          - openid
          - profile
          - email
          - role
          - octo_api
          - offline_access
      - id: System.Identity/RedirectUris
        value: []
      - id: System.Identity/PostLogoutRedirectUris
        value: []
      - id: System.Identity/AllowedCorsOrigins
        value: []
      - id: System.Identity/AutoProvisionInChildTenants
        value: true

  # --------------------------------------------------------------------------
  # 660…35 — MCP Services Interactive OAuth client (spec-compliant MCP client
  # login, e.g. Claude Code `claude mcp login`). Authorization code + PKCE with
  # loopback redirects, offline_access for silent refresh. Deliberately a
  # SEPARATE client from the Swagger UI client (660…33): the CLI loopback flow
  # has different redirect URIs, consent (Claude Code always sends prompt=consent)
  # and refresh needs; overloading the browser Swagger client would only widen its
  # redirect surface. URLs use ${octo.mcp.publicUrl} resolved at apply time by
  # IdentityBlueprintVariableProvider. AB#4338.
  # --------------------------------------------------------------------------
  - rtId: '660000000000000000000035'
    ckTypeId: System.Identity/Client
    rtWellKnownName: McpServicesInteractiveClient
    attributes:
      - id: System/Enabled
        value: true
      - id: System.Identity/ClientId
        value: octo-mcpServices-interactive
      - id: System/Name
        value: OctoMesh MCP Services Interactive Client
      - id: System.Identity/ClientUri
        value: '${octo.mcp.publicUrl}'
      - id: System.Identity/ProtocolType
        value: oidc
      - id: System.Identity/RequireClientSecret
        value: false
      - id: System.Identity/Secrets
        value: []
      - id: System.Identity/AllowedGrantTypes
        value:
          - authorization_code
          # AB#4338: RFC 8693 Token Exchange — same purpose as on the device
          # client, so a user who logged in interactively (Claude Code) can also
          # obtain a target-tenant (B) token from their A token without a prompt.
          - urn:ietf:params:oauth:grant-type:token-exchange
      - id: System.Identity/RequirePkce
        value: true
      - id: System.Identity/AccessTokenType
        value: 0   # Jwt
      - id: System.Identity/AllowOfflineAccess
        value: true
      - id: System.Identity/RedirectUris
        value:
          # Loopback callbacks for interactive OAuth clients (Claude Code `claude mcp login`
          # binds its callback listener on this fixed loopback port). Duende validates redirect_uri
          # by exact match; both localhost and the 127.0.0.1 literal are registered because clients
          # differ in which they use.
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: 'http://localhost:8976/callback'
              - id: System.Identity/Source
                value: base
          - ckRecordId: System.Identity/ClientUriEntry
            attributes:
              - id: System.Identity/Uri
                value: 'http://127.0.0.1:8976/callback'
              - id: System.Identity/Source
                value: base
      - id: System.Identity/PostLogoutRedirectUris
        value: []
      - id: System.Identity/AllowedCorsOrigins
        value: []
      - id: System.Identity/AllowedScopes
        value:
          - openid
          - profile
          - email
          - role
          - octo_api
          - offline_access
      - id: System.Identity/AutoProvisionInChildTenants
        value: true

