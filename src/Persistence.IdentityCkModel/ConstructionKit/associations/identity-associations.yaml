"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
associationRoles:
  - id: AssignedRole
    description: "Links an entity (User or Group) to an assigned Role."
    inboundName: AssignedEntities
    inboundMultiplicity: N
    outboundName: AssignedRoles
    outboundMultiplicity: N
  - id: GroupMember
    description: "Links a Group to its member entities (Users or ExternalTenantUserMappings)."
    inboundName: MemberOfGroups
    inboundMultiplicity: N
    outboundName: Members
    outboundMultiplicity: N
  - id: ChildGroup
    description: "Links a parent Group to a nested child Group."
    inboundName: ParentGroups
    inboundMultiplicity: N
    outboundName: ChildGroups
    outboundMultiplicity: N
