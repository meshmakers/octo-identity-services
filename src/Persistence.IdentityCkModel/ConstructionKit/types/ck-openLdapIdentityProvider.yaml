"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: OpenLdapIdentityProvider
    derivedFromCkTypeId: ${this}/IdentityProvider
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/Host
        name: Host
      - id: ${this}/UseTls
        name: UseTls
      - id: ${this}/Port
        name: Port
      - id: ${this}/UserBaseDn
        name: UserBaseDn
      - id: ${this}/UserNameAttribute
        name: UserNameAttribute