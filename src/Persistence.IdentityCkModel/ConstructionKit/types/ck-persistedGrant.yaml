"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: PersistedGrant
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/GrantKey
        name: GrantKey

      - id: ${this}/GrantType
        name: GrantType

      - id: ${this}/SubjectId
        name: SubjectId

      - id: ${this}/SessionId
        name: SessionId
        isOptional: true

      - id: ${this}/ClientId
        name: ClientId

      - id: ${System}/Description
        name: Description
        isOptional: true

      - id: ${this}/CreationDateTime
        name: CreationDateTime

      - id: ${this}/ExpirationDateTime
        name: ExpirationDateTime
        isOptional: true

      - id: ${this}/ConsumedDateTime
        name: ConsumedDateTime
        isOptional: true

      - id: ${this}/Data
        name: Data