"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: IdentityProvider
    derivedFromCkTypeId: System/Entity
    isFinal: false
    isAbstract: true
    attributes:
      - id: System/Name
        name: Name
      - id: System/Enabled
        name: IsEnabled
      - id: System/DisplayName
        name: DisplayName
        isOptional: true
      - id: System/Description
        name: Description
        isOptional: true
