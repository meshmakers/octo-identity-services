"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: AzureEntraIdIdentityProvider
    derivedFromCkTypeId: ${this}/IdentityProvider
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/TenantId
        name: TenantId

      - id: ${this}/Authority
        name: Authority
        isOptional: true

      - id: ${this}/ClientId
        name: ClientId

      - id: ${this}/ClientSecret
        name: ClientSecret
