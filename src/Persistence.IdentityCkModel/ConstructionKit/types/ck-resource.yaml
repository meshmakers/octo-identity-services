"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Resource
    derivedFromCkTypeId: ${System}/Entity
    isFinal: false
    isAbstract: true
    attributes:
      - id: ${System}/Enabled
        name: Enabled
      - id: ${System}/Name
        name: Name
      - id: ${System}/DisplayName
        name: DisplayName
        isOptional: true
      - id: ${System}/Description
        name: Description
        isOptional: true
      - id: ${this}/ResourceClaims
        name: Claims
      - id: ${this}/ShowInDiscoveryDocument
        name: ShowInDiscoveryDocument