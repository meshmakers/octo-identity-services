"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Client
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/Enabled
        name: Enabled

      - id: ${this}/ClientId
        name: ClientId

      - id: ${this}/ProtocolType
        name: ProtocolType

      - id: ${this}/Secrets
        name: ClientSecrets

      - id: ${this}/RequireClientSecret
        name: RequireClientSecret

      - id: ${System}/Name
        name: ClientName
        isOptional: true

      - id: ${System}/Description
        name: Description
        isOptional: true

      - id: ${this}/ClientUri
        name: ClientUri
        isOptional: true

      - id: ${this}/LogoUri
        name: LogoUri
        isOptional: true

      - id: ${this}/RequireConsent
        name: RequireConsent
        isOptional: true

      - id: ${this}/AllowRememberConsent
        name: AllowRememberConsent

      - id: ${this}/AllowedGrantTypes
        name: AllowedGrantTypes

      - id: ${this}/RequirePkce
        name: RequirePkce

      - id: ${this}/AllowPlainTextPkce
        name: AllowPlainTextPkce

      - id: ${this}/RequireRequestObject
        name: RequireRequestObject

      - id: ${this}/AllowAccessTokensViaBrowser
        name: AllowAccessTokensViaBrowser

      - id: ${this}/RequireDPoP
        name: RequireDPoP

      - id: ${this}/DPoPValidationMode
        name: DPoPValidationMode

      - id: ${this}/DPoPClockSkew
        name: DPoPClockSkew
      - id: ${this}/RedirectUris
        name: RedirectUris

      - id: ${this}/PostLogoutRedirectUris
        name: PostLogoutRedirectUris
      - id: ${this}/FrontChannelLogoutUri
        name: FrontChannelLogoutUri
        isOptional: true
      - id: ${this}/FrontChannelLogoutSessionRequired
        name: FrontChannelLogoutSessionRequired
      - id: ${this}/BackChannelLogoutUri
        name: BackChannelLogoutUri
        isOptional: true
      - id: ${this}/BackChannelLogoutSessionRequired
        name: BackChannelLogoutSessionRequired
      - id: ${this}/AllowOfflineAccess
        name: AllowOfflineAccess
      - id: ${this}/AllowedScopes
        name: AllowedScopes
      - id: ${this}/AlwaysIncludeUserClaimsInIdToken
        name: AlwaysIncludeUserClaimsInIdToken
      - id: ${this}/IdentityTokenLifetime
        name: IdentityTokenLifetime
      - id: ${this}/AllowedIdentityTokenSigningAlgorithms
        name: AllowedIdentityTokenSigningAlgorithms
      - id: ${this}/AccessTokenLifetime
        name: AccessTokenLifetime
      - id: ${this}/AuthorizationCodeLifetime
        name: AuthorizationCodeLifetime
      - id: ${this}/AbsoluteRefreshTokenLifetime
        name: AbsoluteRefreshTokenLifetime
      - id: ${this}/SlidingRefreshTokenLifetime
        name: SlidingRefreshTokenLifetime
      - id: ${this}/ConsentLifetime
        name: ConsentLifetime
        isOptional: true
      - id: ${this}/UpdateAccessTokenClaimsOnRefresh
        name: UpdateAccessTokenClaimsOnRefresh
      - id: ${this}/RefreshTokenExpiration
        name: RefreshTokenExpiration
      - id: ${this}/AccessTokenType
        name: AccessTokenType
      - id: ${this}/EnableLocalLogin
        name: EnableLocalLogin
      - id: ${this}/IdentityProviderRestrictions
        name: IdentityProviderRestrictions
      - id: ${this}/IncludeJwtId
        name: IncludeJwtId
      - id: ${this}/ClientClaims
        name: ClientClaims
      - id: ${this}/AlwaysSendClientClaims
        name: AlwaysSendClientClaims
      - id: ${this}/ClientClaimsPrefix
        name: ClientClaimsPrefix
        isOptional: true
      - id: ${this}/PairWiseSubjectSalt
        name: PairWiseSubjectSalt
        isOptional: true
      - id: ${this}/UserSsoLifetime
        name: UserSsoLifetime
        isOptional: true
      - id: ${this}/UserCodeType
        name: UserCodeType
        isOptional: true
      - id: ${this}/DeviceCodeLifetime
        name: DeviceCodeLifetime
      - id: ${this}/CibaLifetime
        name: CibaLifetime
        isOptional: true
      - id: ${this}/PollingInterval
        name: PollingInterval
        isOptional: true
      - id: ${this}/CoordinateLifetimeWithUserSession
        name: CoordinateLifetimeWithUserSession
        isOptional: true
      - id: ${this}/AllowedCorsOrigins
        name: AllowedCorsOrigins
      - id: ${this}/InitiateLoginUri
        name: InitiateLoginUri
        isOptional: true

      - id: ${this}/AutoProvisionInChildTenants
        name: AutoProvisionInChildTenants

      - id: ${this}/ProvisionedByParentTenantId
        name: ProvisionedByParentTenantId
        isOptional: true
    associations:
      - id: ${this}/AssignedRole
        targetCkTypeId: ${this}/Role