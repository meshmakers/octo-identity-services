"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: Role
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/Name
        name: Name

      - id: ${this}/NormalizedName
        name: NormalizedName

      - id: ${this}/SubjectIds
        name: SubjectIds

      - id: ${this}/IdentityRoleIds
        name: IdentityRoleIds

      - id: ${this}/RoleClaims
        name: Claims
        isOptional: true