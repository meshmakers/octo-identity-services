"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: User
    derivedFromCkTypeId: ${System}/Entity
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/UserName
        name: UserName
        isOptional: true

      - id: ${this}/NormalizedUserName
        name: NormalizedUserName
        isOptional: true

      - id: ${this}/FirstName
        name: FirstName
        isOptional: true

      - id: ${this}/LastName
        name: LastName
        isOptional: true

      - id: ${System}/Description
        name: Description
        isOptional: true

      - id: ${this}/Email
        name: Email
        isOptional: true

      - id: ${this}/NormalizedEmail
        name: NormalizedEmail
        isOptional: true

      - id: ${this}/EmailConfirmed
        name: EmailConfirmed

      - id: ${this}/PasswordHash
        name: PasswordHash
        isOptional: true

      - id: ${this}/SecurityStamp
        name: SecurityStamp
        isOptional: true

      - id: ${this}/PhoneNumber
        name: PhoneNumber
        isOptional: true

      - id: ${this}/PhoneNumberConfirmed
        name: PhoneNumberConfirmed

      - id: ${this}/TwoFactorEnabled
        name: TwoFactorEnabled

      - id: ${this}/LockoutEnd
        name: LockoutEnd
        isOptional: true

      - id: ${this}/LockoutEnabled
        name: LockoutEnabled

      - id: ${this}/AccessFailedCount
        name: AccessFailedCount

      - id: ${this}/ResetPasswordOnLogin
        name: ResetPasswordOnLogin

      - id: ${this}/UserClaims
        name: Claims
        isOptional: true

      - id: ${this}/UserLogins
        name: UserLogins
        isOptional: true

      - id: ${this}/UserTokens
        name: UserTokens
        isOptional: true
    associations:
      - id: ${this}/AssignedRole
        targetCkTypeId: ${this}/Role
    indexes:
      - indexType: Ascending
        fields:
          - attributePaths:
              - NormalizedEmail
      - indexType: Ascending
        fields:
          - attributePaths:
              - NormalizedUserName
