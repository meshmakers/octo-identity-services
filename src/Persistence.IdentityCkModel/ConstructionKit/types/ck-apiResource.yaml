"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
types:
  - typeId: ApiResource
    derivedFromCkTypeId: ${this}/Resource
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/RequireResourceIndicator
        name: RequireResourceIndicator
      - id: ${this}/Secrets
        name: ApiSecrets
      - id: ${this}/Scopes
        name: Scopes
      - id: ${this}/AllowedAccessTokenSigningAlgorithms
        name: AllowedAccessTokenSigningAlgorithms        
  