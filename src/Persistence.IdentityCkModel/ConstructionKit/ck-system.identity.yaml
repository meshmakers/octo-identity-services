  description: Value indicating whether JWT access tokens should include an identifier. Defaults to true.
- id: ClientClaims
  valueType: RecordArray
  valueCkRecordId: System.Identity-1.0.0/ClientClaim-1.0.0
  defaultValues: []
  description: Gets or sets the client claims to be sent to the user info endpoint.
- id: AlwaysSendClientClaims
  valueType: Boolean
  defaultValues:
  - false
  description: Gets or sets a value indicating whether client claims should be always included in the access tokens - or only for client credentials flow.
- id: ClientClaimsPrefix
  valueType: String
  defaultValues:
