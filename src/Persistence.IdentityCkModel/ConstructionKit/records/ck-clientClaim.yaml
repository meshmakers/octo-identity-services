"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: ClientClaim
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/ClaimType
        name: ClaimType
      - id: ${this}/ClaimValue
        name: ClaimValue
      - id: ${this}/ClaimValueType
        name: ClaimValueType
    