"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: UserClaim
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/ClaimType
        name: ClaimType
      - id: ${this}/ClaimValue
        name: ClaimValue
      - id: ${this}/UserId
        name: UserId
        isOptional: true
    