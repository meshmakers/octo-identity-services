"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: UserClaim
    isFinal: true
    isAbstract: false
    attributes:
      - id: System.Identity/ClaimType
        name: ClaimType
      - id: System.Identity/ClaimValue
        name: ClaimValue
      - id: System.Identity/UserId
        name: UserId
        isOptional: true
    