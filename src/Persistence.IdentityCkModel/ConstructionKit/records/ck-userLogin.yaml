"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: UserLogin
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/LoginProvider
        name: LoginProvider
      - id: ${this}/ProviderKey
        name: ProviderKey
      - id: ${this}/ProviderDisplayName
        name: ProviderDisplayName
        isOptional: true
      - id: ${this}/UserId
        name: UserId    