"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: Secret
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${System}/Description
        name: Description
        isOptional: true
      - id: ${this}/ExpirationDateTime
        name: ExpirationDateTime
        isOptional: true
      - id: ${this}/Value
        name: Value
        isOptional: true
      - id: ${this}/SecretType
        name: Type
    