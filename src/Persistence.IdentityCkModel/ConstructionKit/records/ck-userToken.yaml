"$schema": "https://schemas.meshmakers.cloud/construction-kit-elements.schema.json"
records:
  - recordId: UserToken
    isFinal: true
    isAbstract: false
    attributes:
      - id: ${this}/LoginProvider
        name: LoginProvider
      - id: ${System}/Name
        name: Name
      - id: ${this}/UserId
        name: UserId
      - id: ${this}/Value
        name: Value
        isOptional: true