<div class="lcars-auth-container">
  <app-lcars-panel>
    <app-lcars-header
      subtitle="Sign in to continue"
      [showUserMenu]="false">
    </app-lcars-header>

    <!-- Loading State -->
    <div *ngIf="loading" class="lcars-loading">
      <div class="lcars-loading__spinner"></div>
      <span class="lcars-loading__text">Loading</span>
    </div>

    <!-- Already Authenticated -->
    <ng-container *ngIf="!loading && context?.isAuthenticated && !showLoginForm">
      <div class="lcars-already-authenticated">
        <div class="lcars-already-authenticated__icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="48" height="48">
            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
          </svg>
        </div>
        <div class="lcars-already-authenticated__message">
          You are signed in as
        </div>
        <div class="lcars-already-authenticated__username">
          {{ context?.username }}
        </div>

        <div class="lcars-actions lcars-actions--stacked">
          <button
            type="button"
            class="lcars-button-primary"
            (click)="continueAsUser()">
            Continue to Profile
          </button>
          <button
            type="button"
            class="lcars-button-secondary"
            (click)="signOutAndSignIn()">
            Sign in as different user
          </button>
        </div>
      </div>
    </ng-container>

    <!-- Login Form -->
    <ng-container *ngIf="!loading && (!context?.isAuthenticated || showLoginForm)">
      <!-- Client Info -->
      <div *ngIf="context?.clientName" class="lcars-client-info">
        <div class="lcars-client-info__logo" *ngIf="context?.clientLogoUrl">
          <img [src]="context!.clientLogoUrl" [alt]="context!.clientName" />
        </div>
        <div class="lcars-client-info__details">
          <span class="lcars-client-info__name">{{ context!.clientName }}</span>
        </div>
      </div>

      <!-- Error Message -->
      <div *ngIf="errorMessage" class="lcars-error-message">
        {{ errorMessage }}
      </div>

      <!-- Local Login Form -->
      <form *ngIf="showLocalLogin" (ngSubmit)="onSubmit()" #loginForm="ngForm">
        <div class="lcars-form-group">
          <label for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            [(ngModel)]="username"
            required
            autocomplete="username"
            [disabled]="submitting"
            placeholder="Enter your username" />
        </div>

        <div class="lcars-form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            [(ngModel)]="password"
            required
            autocomplete="current-password"
            [disabled]="submitting"
            placeholder="Enter your password" />
        </div>

        <div class="lcars-checkbox-group" *ngIf="context?.allowRememberLogin">
          <input
            type="checkbox"
            id="rememberLogin"
            name="rememberLogin"
            [(ngModel)]="rememberLogin"
            class="lcars-checkbox"
            [disabled]="submitting" />
          <label for="rememberLogin">Remember me</label>
        </div>

        <div class="lcars-actions lcars-actions--stacked">
          <button
            type="submit"
            class="lcars-button-primary"
            [disabled]="submitting || !username || !password">
            <span *ngIf="!submitting">Sign In</span>
            <span *ngIf="submitting">Signing in...</span>
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div *ngIf="showLocalLogin && hasExternalProviders" class="lcars-divider">
        or continue with
      </div>

      <!-- External Providers -->
      <div *ngIf="hasExternalProviders" class="lcars-providers">
        <app-external-provider-button
          *ngFor="let provider of context?.externalProviders"
          [provider]="provider"
          [disabled]="submitting"
          (login)="onExternalLogin($event)">
        </app-external-provider-button>
      </div>

      <!-- Footer Links -->
      <div class="lcars-footer-links">
        <a *ngIf="showLoginForm" href="javascript:void(0)" (click)="cancelSwitchUser()">
          Cancel
        </a>
        <a [routerLink]="['/', tenantId, 'forgot-password']">Forgot password?</a>
      </div>
    </ng-container>
  </app-lcars-panel>
</div>
